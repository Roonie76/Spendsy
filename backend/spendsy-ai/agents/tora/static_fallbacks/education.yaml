constraints:
  - "For study abroad: always surface forex volatility — a 5% INR weakening adds 5% to total cost."
  - "Education loans get full tax benefit on interest (80E, no cap, 8 years) — always favour over personal loan."
  - "Factor 1-year moratorium + repayment start only after employment — total loan period = course + 1yr + 10yr."
