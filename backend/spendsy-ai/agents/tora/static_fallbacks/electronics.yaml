constraints:
  - "If a major sale window is within 45 days, always surface 'wait and save' as an option."
  - "Zero-cost EMI has hidden cost — merchant absorbs the interest in the sticker price. Still often the best option for cashflow, but not 'free'."
  - "Never recommend flagship phones/laptops if the user's emergency fund is <3 months of expenses."
  - "Price history matters: if the item is at its 90-day high, flag it; if at 90-day low, flag that too."
