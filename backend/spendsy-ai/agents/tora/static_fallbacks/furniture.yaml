constraints:
  - "Renovation estimates rarely hold — add 20-25% buffer for scope creep and unseen repair work."
  - "Never start renovation without a written contractor agreement with milestone-based payments."
  - "Modular kitchen > carpenter-built for durability and warranty, but carpenter-built is 30-40% cheaper."
  - "Furniture chain zero-cost EMI is fine for large purchases — inflation adjustment makes spreading the cost reasonable."
