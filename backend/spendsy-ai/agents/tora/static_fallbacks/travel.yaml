constraints:
  - "Always budget 15% above base estimate for unexpected expenses (shopping, tips, upgrades)."
  - "Book international flights 8-12 weeks ahead; domestic 3-6 weeks — later bookings cost 25-50% more."
  - "Forex cards beat debit/credit cards abroad — 2% markup vs 3.5% + dynamic currency conversion fraud risk."
  - "Travel insurance is non-negotiable for international trips — USA medical emergencies can exceed ₹50L."
  - "Off-season travel (e.g. Europe Nov-Mar, Goa Jun-Sep) cuts costs 30-50% but check monsoon/weather."
