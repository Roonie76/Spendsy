constraints:
  - "Wedding cost of 3-6x annual income is common in India but often ruinous — always surface lower-cost alternatives."
  - "Off-season wedding (Jun-Aug) saves 25-35% on all vendors. Monsoon risk is real but manageable with indoor venues."
  - "Treat jewellery as separate from wedding budget — it has investment value; other costs don't."
  - "Destination weddings look cheaper per-head but total cost is typically 30-40% higher due to logistics."
  - "Never recommend taking a personal loan for wedding — rates are 14-18%, amortises no appreciating asset."
