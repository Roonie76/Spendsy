constraints:
  - "Mandatory: every working adult should have ₹10L+ health insurance and ₹1Cr+ term life."
  - "Health insurance premium is deductible under 80D — up to ₹25K self + ₹50K parents (senior). Never skip."
  - "Always check room rent sublimit and co-payment clauses — these gut claims more than low sum insured does."
  - "Senior parents' premiums triple after age 60. Start early — ideally buy for them before they turn 55."
  - "Never quote exact procedure prices without warning of variance — actual cost depends on hospital tier, complications, length of stay."
