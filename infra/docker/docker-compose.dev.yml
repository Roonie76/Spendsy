services:
  postgres:
    image: postgres:15
    container_name: spendsy_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spendsy}
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
    ports:
      - "5434:5432" # Host port 5434 maps to container postgres port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-spendsy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: spendsy_redis
    restart: always
    ports:
      - "6379:6379" # Standard redis port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── Connection Pooler ──────────────────────────────────────────────────────
  # PgBouncer sits between app services and PostgreSQL to enforce transaction-
  # mode pooling, preventing microservices from exhausting max_connections.
  pgbouncer:
    image: bitnami/pgbouncer:1
    container_name: spendsy_pgbouncer
    restart: always
    environment:
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-spendsy}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-smartuser}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432" # Standard pgbouncer port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-smartuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  auth-service:
    build: ../../spendsy/services/auth-service
    container_name: spendsy_auth
    restart: always
    environment:
      # Route through PgBouncer (port 6432) instead of Postgres directly
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-120}
      AUTH_RATE_LIMIT_LOGIN: ${AUTH_RATE_LIMIT_LOGIN:-200}
      AUTH_RATE_LIMIT_REGISTER: ${AUTH_RATE_LIMIT_REGISTER:-50}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000" # Host port 8001 -> Auth Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  finance-service:
    build: ../../spendsy/services/finance-service
    container_name: spendsy_finance
    restart: always
    environment:
      # Route through PgBouncer (port 6432) instead of Postgres directly
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALGORITHM: HS256
      PARSER_SERVICE_URL: http://parser-service:8000
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-dev-key}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser-service:
        condition: service_healthy
    ports:
      - "8002:8000" # Host port 8002 -> Finance Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  parser-service:
    build: ../../spendsy/services/parser-service
    container_name: spendsy_parser
    restart: always
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8003:8000" # Host port 8003 -> Parser Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  ai-service:
    build: ../../spendsy/services/ai-service
    container_name: spendsy_ai
    restart: always
    environment:
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALGORITHM: HS256
      FINANCE_SERVICE_URL: http://finance-service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-dev-key}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8004:8000" # Host port 8004 -> AI Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: spendsy_gateway
    restart: always
    depends_on:
      auth-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      parser-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "8080:80"   # Host port 8080 -> NGINX API Gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  postgres_data:
