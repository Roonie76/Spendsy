services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: spendsy_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spendsy}
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
    ports:
      - "5434:5432" # Host port 5434 maps to container postgres port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-spendsy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: spendsy_redis
    restart: always
    ports:
      - "6379:6379" # Standard redis port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  auth-service:
    build:
      context: ../../
      dockerfile: backend/auth-service/Dockerfile
    container_name: spendsy_auth
    restart: always
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-spendsy-very-secure-secret-key-32chars}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../backend/auth-service:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000" # Host port 8001 -> Auth Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  finance-service:
    build:
      context: ../../
      dockerfile: backend/finance-service/Dockerfile
    container_name: spendsy_finance
    restart: always
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-spendsy-very-secure-secret-key-32chars}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../backend/finance-service:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8002:8000" # Host port 8002 -> Finance Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  spendsy-ai:
    build:
      context: ../../
      dockerfile: backend/spendsy-ai/Dockerfile
    container_name: spendsy_tora
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8005", "--reload"]
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FINANCE_SERVICE_URL: http://finance-service:8000
      SPENDSY_MCP_URL: http://spendsy-mcp:8006/mcp/sse
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MODEL_GEMMA: gemma4:e2b
      MODEL_LLAMA: gemma4:e2b
      VAULT_BASE_PATH: /data/vaults
      # browserless/chromium exposes CDP on internal port 3000, not 9222.
      # Only active when the 'cdp' profile is passed; TORA gracefully skips
      # browser-tool calls when this URL is unreachable.
      OBSCURA_CDP_URL: ws://obscura:3000
    volumes:
      - ../../backend/spendsy-ai:/app
      - spendsy-vaults:/data/vaults
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - finance-service
      - redis
    ports:
      - "8004:8005" # Host port 8004 -> Spendsy AI (TORA)
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  ai-service:
    build:
      context: ../../
      dockerfile: backend/ai-service/Dockerfile
    container_name: spendsy_ai_legacy
    restart: always
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../backend/ai-service:/app
    working_dir: /app
    depends_on:
      - redis
    ports:
      - "8003:8000" # Host port 8003 -> Legacy AI Service
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  spendsy-mcp:
    build:
      context: ../../
      dockerfile: backend/spendsy-mcp/Dockerfile
    container_name: spendsy_mcp
    restart: always
    command: ["python", "server.py"]
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      MCP_TRANSPORT: sse
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8006
      FASTMCP_SSE_PATH: /mcp/sse
      FASTMCP_MESSAGE_PATH: /mcp/messages/
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FINANCE_SERVICE_URL: http://finance-service:8000
    volumes:
      - ../../backend/spendsy-mcp:/app
    working_dir: /app
    ports:
      - "8005:8006" # Host port 8005 -> Spendsy MCP
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # CDP-capable headless browser — exposes Chrome DevTools Protocol.
  # Replaces the no-longer-accessible h4ckf0r0day/obscura image.
  # Guarded by the 'cdp' profile — does NOT start during normal `docker compose up`.
  # To enable: docker compose --profile cdp up
  obscura:
    image: ghcr.io/browserless/chromium:latest
    container_name: spendsy_obscura
    restart: unless-stopped
    environment:
      - TIMEOUT=60000
      - CONCURRENT=4
      - TOKEN=${OBSCURA_TOKEN:-}
    ports:
      - "9222:3000"   # browserless internal port is 3000; host keeps 9222 for compat
    profiles:
      - cdp
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: spendsy_gateway
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"   # Host port 8080 -> NGINX API Gateway HTTP
      - "8443:443"  # Host port 8443 -> NGINX API Gateway HTTPS
    volumes:
      - ./nginx.dev-hybrid.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  frontend:
    build:
      context: ../../
      dockerfile: Dockerfile.frontend
      args:
        VITE_AUTH_URL: http://localhost:8001
        VITE_FINANCE_URL: http://localhost:8002
        VITE_AI_URL: http://localhost:8004
    container_name: spendsy_frontend
    restart: always
    ports:
      - "3000:80"   # Direct access to frontend (optional if using gateway)
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    profiles:
      - docker-frontend

volumes:
  postgres_data:
  spendsy-vaults:
