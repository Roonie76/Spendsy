services:
  postgres:
    image: postgres:15
    container_name: spendsy_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spendsy}
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
    ports:
      - "5434:5432" # Host port 5434 maps to container postgres port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-spendsy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: spendsy_redis
    restart: always
    ports:
      - "6379:6379" # Standard redis port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  auth-service:
    build:
      context: ../../
      dockerfile: Spendsy/services/auth-service/Dockerfile
    container_name: spendsy_auth
    restart: always
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-spendsy-very-secure-secret-key-32chars}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-120}
      AUTH_RATE_LIMIT_LOGIN: ${AUTH_RATE_LIMIT_LOGIN:-200}
      AUTH_RATE_LIMIT_REGISTER: ${AUTH_RATE_LIMIT_REGISTER:-50}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../Spendsy/services/auth-service:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000" # Host port 8001 -> Auth Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  finance-service:
    build:
      context: ../../
      dockerfile: Spendsy/services/finance-service/Dockerfile
    container_name: spendsy_finance
    restart: always
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-spendsy}
      DB_USER: ${POSTGRES_USER:-smartuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      JWT_SECRET: ${JWT_SECRET:-spendsy-very-secure-secret-key-32chars}
      JWT_ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../Spendsy/services/finance-service:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8002:8000" # Host port 8002 -> Finance Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M

  ai-service:
    build:
      context: ../../
      dockerfile: Spendsy/services/ai-service/Dockerfile
    container_name: spendsy_ai
    restart: always
    env_file:
      - ../../.env
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-spendsy-very-secure-secret-key-32chars}
      JWT_ALGORITHM: HS256
      FINANCE_SERVICE_URL: http://finance-service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-spendsy-internal-api-key-32chars-long}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ../../Spendsy/services/ai-service:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8004:8000" # Host port 8004 -> AI Service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: spendsy_gateway
    restart: always
    depends_on:
      auth-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "8080:80"   # Host port 8080 -> NGINX API Gateway HTTP
      - "8443:443"  # Host port 8443 -> NGINX API Gateway HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  frontend:
    build:
      context: ../../
      dockerfile: Dockerfile.frontend
      args:
        VITE_AUTH_URL: http://localhost:8001
        VITE_FINANCE_URL: http://localhost:8002
        VITE_AI_URL: http://localhost:8004
    container_name: spendsy_frontend
    restart: always
    ports:
      - "3000:80"   # Direct access to frontend (optional if using gateway)
    depends_on:
      - auth-service
      - finance-service

volumes:
  postgres_data:
