services:
  db:
    image: postgres:15
    container_name: smartspend_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartspend}
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-smartspend}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./apps/web/backend
    container_name: smartspend_backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    volumes:
      - ./apps/web/backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: ${DJANGO_SECRET_KEY:?set-this}
      USE_POSTGRES: "True"
      DATABASE_NAME: ${POSTGRES_DB:-smartspend}
      DATABASE_USER: ${POSTGRES_USER:-smartuser}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_AUTH_URL: http://localhost:8000/api/finance
        VITE_FINANCE_URL: http://localhost:8000/api/finance
    container_name: smartspend_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
