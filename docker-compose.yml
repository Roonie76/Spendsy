services:
  db:
    image: postgres:15
    container_name: spendsy_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spendsy}
      POSTGRES_USER: ${POSTGRES_USER:-smartuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartuser} -d ${POSTGRES_DB:-spendsy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Legacy monolithic backend is disabled. Use the microservices in backend/

  spendsy-ai:
    build:
      context: .
      dockerfile: backend/spendsy-ai/Dockerfile
    container_name: spendsy_tora_prod
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8005"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      ENVIRONMENT: production
      FINANCE_SERVICE_URL: http://finance-service:8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8004:8005"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_AUTH_URL: http://localhost:8000/api/finance
        VITE_FINANCE_URL: http://localhost:8000/api/finance
    container_name: spendsy_frontend
    ports:
      - "3000:80"

  obscura:
    image: ghcr.io/h4ckf0r0day/obscura:latest
    container_name: spendsy_obscura
    ports:
      - "9222:9222"
    command: ["--cdp-port=9222", "--stealth", "--parallel=4"]
    mem_limit: 128m
    restart: always

volumes:
  postgres_data:
